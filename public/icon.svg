<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>

  <!-- curved connection (primary flow) -->
  <path
    d="M10 11C13 11 17 11 20 14"
    stroke="#6366f1"
    stroke-width="2"
    fill="none"
    stroke-linecap="round"
  />

  <!-- curved connection (secondary flow) -->
  <path
    d="M10 15C13 15 17 15 20 18"
    stroke="#6366f1"
    stroke-width="2"
    fill="none"
    stroke-linecap="round"
    opacity="0.6"
  />

  <!-- left vertical line -->
  <path d="M10 7v18" stroke="#111827" stroke-width="2" stroke-linecap="round"/>

  <!-- right vertical branch (closer) -->
  <path d="M20 10v13" stroke="#111827" stroke-width="2" stroke-linecap="round"/>

  <!-- output continuation -->
  <path
    d="M21 25h7"
    stroke="#111827"
    stroke-width="2"
    fill="none"
    stroke-linecap="round"
  />

  <!-- nodes (UNCHANGED) -->
  <circle cx="10" cy="7" r="2" fill="#111827"/>
  <circle cx="20" cy="25" r="2" fill="#6366f1"/>
</svg>